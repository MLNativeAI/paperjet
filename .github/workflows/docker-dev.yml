name: Development Docker Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: mlnative/paperjet-dev

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{date 'YYYYMMDD'}}-{{sha}},enable={{is_default_branch}}

      # Build for AMD64 only by default, ARM64 in separate job if needed
      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

  deploy-dev:
    name: Deploy to Coolify Dev
    needs: build-and-push
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: development
    
    steps:
      - name: Extract image tag
        id: image
        run: |
          # Extract the latest tag with SHA from the build metadata
          FULL_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}"
          echo "tag=${FULL_TAG}" >> $GITHUB_OUTPUT
          echo "Deploying image: ${FULL_TAG}"

      - name: Update Coolify application image
        run: |
          curl -X PATCH \
            "${{ secrets.COOLIFY_DEV_URL }}/api/v1/applications/${{ secrets.COOLIFY_DEV_APP_UUID }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "docker_registry_image_name": "${{ env.IMAGE_NAME }}"
              "docker_registry_image_tag":  "${{ steps.image.outputs.tag }}"
            }'

      - name: Deploy to Coolify
        run: |
          curl -X GET \
            "${{ secrets.COOLIFY_DEV_URL }}/api/v1/applications/${{ secrets.COOLIFY_DEV_APP_UUID }}/deploy" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_DEV_TOKEN }}" \
            -H "Content-Type: application/json"